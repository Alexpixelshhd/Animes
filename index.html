<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro 🌌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efectos visuales de alta calidad */
        .glass-header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        
        .anime-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.2);
        }

        /* Ocultar scrollbar pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-blue-500/30">

    <nav class="glass-header sticky top-0 z-50 px-4 py-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg shadow-lg shadow-blue-900/40">
                    <span class="text-2xl">✨</span>
                </div>
                <h1 class="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    ZENITH ANIME PRO
                </h1>
            </div>

            <div class="relative w-full md:w-1/3 group">
                <input 
                    type="text" 
                    id="main-search" 
                    placeholder="Explorar series..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-2.5 px-11 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500"
                >
                <span class="absolute left-4 top-3 text-slate-500 group-focus-within:text-blue-400 transition-colors">🔍</span>
            </div>

            <button id="btn-show-favorites" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 px-5 py-2.5 rounded-2xl font-bold transition-all active:scale-95 text-sm">
                <span>⭐</span> Mis Favoritos
            </button>
        </div>
    </nav>

    <section class="container mx-auto mt-8 px-4">
        <div class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar" id="filters-container">
            <button data-genre="" class="filter-btn active bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg shadow-blue-900/30 whitespace-nowrap">🔥 Tendencias</button>
            <button data-genre="1" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors">⚔️ Acción</button>
            <button data-genre="22" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors">💖 Romance</button>
            <button data-genre="4" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors">🎭 Comedia</button>
            <button data-genre="37" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors">👻 Sobrenatural</button>
            <button data-genre="10" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors">🧙 Fantasía</button>
        </div>
    </section>

    <main class="container mx-auto mt-6 p-4">
        <h2 id="section-title" class="text-lg font-bold text-slate-400 mb-6 flex items-center gap-2">
            <span class="w-8 h-[2px] bg-blue-500"></span> 
            Mostrando: Populares
        </h2>

        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <div class="col-span-full text-center py-24 opacity-40">
                <div class="inline-block animate-spin text-4xl mb-4">⚙️</div>
                <p class="text-xl font-medium tracking-tight">Sincronizando con la base de datos...</p>
            </div>
        </div>
    </main>

    <div id="toast-notify" class="fixed bottom-8 right-8 translate-y-24 opacity-0 transition-all duration-500 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] font-bold text-sm pointer-events-none">
        Añadido correctamente ⭐
    </div>

    <script src="script.js"></script>
</body>
</html>
