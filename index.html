<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithAnime | Explorador Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(22, 27, 44, 0.8); backdrop-filter: blur(12px); }
        .anime-card:hover { transform: translateY(-8px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#080a10] text-gray-100 min-h-screen">

    <nav class="glass border-b border-gray-800 sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                ZENITH ANIME 🌌
            </h1>
            
            <div class="relative w-full md:w-96">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Busca un anime..." 
                    class="w-full bg-[#1c2333] border border-gray-700 rounded-full py-2 px-10 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
                <span class="absolute left-3 top-2.5 opacity-50">🔍</span>
            </div>
        </div>
    </nav>

    <header class="container mx-auto mt-12 px-4 text-center">
        <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-sm font-bold mb-4">
            Sincronización Automática v3.0 ⚡
        </div>
        <h2 class="text-5xl font-extrabold mb-4 tracking-tight">Tu brújula en el mundo <span class="text-blue-500">Otaku</span></h2>
        <p class="text-gray-400 max-w-xl mx-auto text-lg leading-relaxed">
            Información verídica, enlaces legales y tecnología de búsqueda inteligente.
        </p>
    </header>

    <div class="container mx-auto mt-10 px-4 flex flex-wrap justify-center gap-3">
        <button class="px-6 py-2 rounded-full bg-blue-600 font-bold hover:bg-blue-500 transition-colors">🔥 Tendencias</button>
        <button class="px-6 py-2 rounded-full bg-gray-800 font-semibold hover:bg-gray-700 transition-colors">⚔️ Acción</button>
        <button class="px-6 py-2 rounded-full bg-gray-800 font-semibold hover:bg-gray-700 transition-colors">🚀 Sci-Fi</button>
        <button class="px-6 py-2 rounded-full bg-gray-800 font-semibold hover:bg-gray-700 transition-colors">💖 Romance</button>
    </div>

    <main class="container mx-auto mt-16 px-4 mb-24">
        <div id="anime-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                <p class="mt-4 text-gray-500 font-medium">Conectando con bases de datos globales...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-900 py-10 text-center text-gray-600 text-sm">
        &copy; 2024 ZenithAnime Pro | Datos Vía Jikan API 🧬
    </footer>

    <script src="script.js"></script>
</body>
</html>
