<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro | Portal 🌌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización de fondo y efectos */
        body { background-color: #050811; color: #e2e8f0; font-family: sans-serif; }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(51, 65, 85, 0.5); 
        }
        /* Ocultar barra de scroll lateral en filtros */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg">🚀</div>
                <h1 class="text-2xl font-black tracking-tighter text-white">
                    ZENITH <span class="text-blue-500">ANIME</span>
                </h1>
            </div>
            
            <div class="relative w-full md:w-1/3 group">
                <input 
                    type="text" 
                    id="input-busqueda" 
                    placeholder="Explorar series y películas..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-2.5 px-11 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-500 text-sm"
                >
                <span class="absolute left-4 top-3 text-slate-500 group-focus-within:text-blue-400">🔍</span>
            </div>

            <div class="flex gap-4">
                <button id="btn-favoritos" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2 rounded-xl font-bold text-xs transition-all active:scale-95">
                    ⭐ Favoritos
                </button>
            </div>
        </div>
    </nav>

    <header class="container mx-auto mt-8 px-4">
        <div class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar">
            <button class="btn-filtro bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg" data-genre="">🔥 Top Populares</button>
            <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors" data-genre="1">⚔️ Acción</button>
            <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors" data-genre="22">💖 Romance</button>
            <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors" data-genre="4">🎭 Comedia</button>
            <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors" data-genre="37">👻 Sobrenatural</button>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4">
        <div id="grilla-animes" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <div class="col-span-full text-center py-24 opacity-50">
                <div class="inline-block animate-spin text-3xl mb-4">⚙️</div>
                <p class="text-lg font-medium tracking-tight">Sincronizando con la base de datos...</p>
            </div>
        </div>
    </main>

    <div id="notificacion" class="fixed bottom-8 right-8 translate-y-24 opacity-0 transition-all duration-500 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] font-bold text-sm pointer-events-none">
        Añadido correctamente ⭐
    </div>

    <script src="script.js"></script>
</body>
</html>
