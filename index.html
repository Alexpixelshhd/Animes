<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro | Portal 🌌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo profundo y efectos de cristal */
        body { background-color: #050811; }
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(51, 65, 85, 0.5); 
        }
        /* Animación suave para las tarjetas */
        .anime-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .anime-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); 
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">
                ZENITH ANIME PRO 🌌
            </h1>
            
            <div class="relative w-full md:w-96">
                <input 
                    type="text" 
                    id="input-busqueda" 
                    placeholder="Buscar anime por nombre..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-10 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
                <span class="absolute left-3 top-2.5 opacity-50">🔍</span>
            </div>

            <button id="btn-favoritos" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-bold text-sm transition-colors">
                ⭐ Favoritos
            </button>
        </div>
    </nav>

    <section class="container mx-auto mt-8 px-4 flex flex-wrap gap-3 justify-center">
        <button class="btn-filtro bg-slate-800 hover:bg-blue-600 px-5 py-2 rounded-full text-xs font-bold transition-all" data-id="">🔥 Top</button>
        <button class="btn-filtro bg-slate-800 hover:bg-blue-600 px-5 py-2 rounded-full text-xs font-bold transition-all" data-id="1">⚔️ Acción</button>
        <button class="btn-filtro bg-slate-800 hover:bg-blue-600 px-5 py-2 rounded-full text-xs font-bold transition-all" data-id="22">💖 Romance</button>
        <button class="btn-filtro bg-slate-800 hover:bg-blue-600 px-5 py-2 rounded-full text-xs font-bold transition-all" data-id="4">🎭 Comedia</button>
    </section>

    <main class="container mx-auto mt-10 p-4">
        <div id="grilla-animes" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <p class="col-span-full text-center text-slate-500 animate-pulse">
                Iniciando conexión con la base de datos... ⚙️
            </p>
        </div>
    </main>

    <footer class="text-center py-10 border-t border-slate-900 mt-10 opacity-30 text-xs">
        © 2026 Zenith Anime Pro - Powered by Jikan API
    </footer>

    <script src="script.js"></script>
</body>
</html>
