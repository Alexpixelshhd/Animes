<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Radar | Tu Guía Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .anime-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-100 min-h-screen">

    <nav class="bg-[#161b2c] border-b border-gray-800 sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                📺 ANIME RADAR
            </h1>
            <span class="text-xs font-mono bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-500/30">
                v2.0 Auto-Sync
            </span>
        </div>
    </nav>

    <section class="container mx-auto mt-8 px-4 text-center">
        <h2 class="text-4xl font-bold mb-2">Descubre tu próximo favorito</h2>
        <p class="text-gray-400 max-w-2xl mx-auto">
            Recomendaciones actualizadas automáticamente desde las bases de datos oficiales. 
            Información verídica y enlaces legales.
        </p>
    </section>

    <main class="container mx-auto mt-12 px-4 mb-20">
        <div class="flex items-center mb-8 space-x-4">
            <div class="h-1 w-12 bg-blue-500 rounded"></div>
            <h3 class="text-xl font-bold uppercase tracking-wider text-blue-400">Tendencias actuales</h3>
        </div>
        
        <div id="anime-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-500">Sincronizando con la base de datos...</p>
            </div>
        </div>
    </main>

    <footer class="bg-[#161b2c] py-12 border-t border-gray-800 text-center">
        <p class="text-gray-500 text-sm">
            © 2024 Anime Radar | Desarrollado con Jikan API
        </p>
    </footer class="mb-10">

    <script src="script.js"></script>
</body>
</html>
