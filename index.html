<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Stream Pro | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .anime-card:hover img { transform: scale(1.05); }
        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e40af; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200">

    <nav class="sticky top-0 z-50 glass px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter uppercase">Zenith Stream Pro</h1>
            <div class="relative w-full max-w-md">
                <input type="text" id="buscador" placeholder="Busca tu anime favorito..." 
                       class="w-full bg-slate-900/50 border border-slate-700 p-3 pl-10 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                <span class="absolute left-3 top-3.5 opacity-40">🔍</span>
            </div>
        </div>
    </nav>

    <section id="vista-reproductor" class="max-w-5xl mx-auto mb-12 px-4 hidden">
        <div class="glass rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="aspect-video bg-black relative">
                <iframe id="main-player" src="" class="w-full h-full" allowfullscreen></iframe>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="player-title" class="text-xl font-bold text-white">Nombre del Anime</h2>
                    <span class="text-xs bg-blue-600 px-3 py-1 rounded-full font-black uppercase tracking-widest">EP 01</span>
                </div>
                
                <p class="text-sm text-slate-400 mb-6 uppercase font-bold tracking-tight">Seleccionar Servidor:</p>
                <div id="player-servers" class="flex flex-wrap gap-3">
                    </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6">
        <div class="flex items-center gap-2 mb-8">
            <div class="h-6 w-1 bg-blue-600 rounded-full"></div>
            <h2 class="text-lg font-bold uppercase tracking-widest">Explorar Catálogo</h2>
        </div>
        
        <div id="catalogo" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            </div>
    </main>

    <footer class="py-20 text-center opacity-30 text-xs uppercase tracking-[0.3em]">
        Powered by GitHub & Jikan API • Zenith 2024
    </footer>

    <script>
        /**
         * 1. TU BASE DE DATOS (GRATIS)
         * Aquí es donde agregarás tus links. 
         * El 'slug' debe coincidir con el nombre que genera la función crearSlug.
         */
        const MIS_LINKS = {
            "jojos-bizarre-adventure": {
                ep1: [
                    { name: "MEGA", url: "https://mega.nz/embed/EJEMPLO_MEGA" },
                    { name: "FEMBED", url: "https://www.fembed.com/v/EJEMPLO_FEMBED" }
                ]
            },
            "one-piece": {
                ep1: [
                    { name: "STREAMTAPE", url: "https://streamtape.com/e/EJEMPLO_ST" }
                ]
            }
        };

        const buscador = document.getElementById('buscador');
        const catalogo = document.getElementById('catalogo');
        const vistaPlayer = document.getElementById('vista-reproductor');
        const mainPlayer = document.getElementById('main-player');
        const playerTitle = document.getElementById('player-title');
        const playerServers = document.getElementById('player-servers');

        // Función para limpiar nombres (Slug)
        const crearSlug = (t) => t.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '-');

        // Función para cambiar de servidor
        function cambiarServidor(url) {
            mainPlayer.src = url;
        }

        // Función para abrir el reproductor
        function abrirAnime(slug, titulo) {
            const data = MIS_LINKS[slug];
            
            if (data) {
                vistaPlayer.classList.remove('hidden');
                playerTitle.innerText = titulo;
                playerServers.innerHTML = '';
                
                // Cargamos el Episodio 1 por defecto
                data.ep1.forEach((srv, i) => {
                    const btn = document.createElement('button');
                    btn.className = "bg-slate-800 hover:bg-blue-600 px-5 py-2.5 rounded-xl text-xs font-black uppercase transition-all border border-slate-700 shadow-lg";
                    btn.innerText = srv.name;
                    btn.onclick = () => cambiarServidor(srv.url);
                    playerServers.appendChild(btn);
                    
                    if(i === 0) cambiarServidor(srv.url); // Carga el primero automáticamente
                });

                window.scrollTo({ top: 100, behavior: 'smooth' });
            } else {
                alert("Aún no hemos subido servidores propios para este anime. Pronto estará disponible.");
            }
        }

        // Obtener datos de la API
        async function cargarAnimes(busqueda = '') {
            catalogo.innerHTML = `<div class="col-span-full py-20 text-center animate-pulse uppercase tracking-widest opacity-50">Sincronizando...</div>`;
            
            try {
                const url = busqueda 
                    ? `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(busqueda)}&limit=18`
                    : `https://api.jikan.moe/v4/top/anime?limit=18`;

                const res = await fetch(url);
                const { data } = await res.json();
                
                renderizar(data);
            } catch (e) {
                catalogo.innerHTML = `<div class="col-span-full py-20 text-center text-red-500 uppercase font-black">Error de conexión</div>`;
            }
        }

        function renderizar(lista) {
            catalogo.innerHTML = '';
            lista.forEach(anime => {
                const slug = crearSlug(anime.title);
                const tieneLink = MIS_LINKS[slug] ? true : false;

                const card = document.createElement('div');
                card.className = "anime-card group relative cursor-pointer";
                card.onclick = () => abrirAnime(slug, anime.title);
                
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-2xl aspect-[3/4] shadow-xl">
                        <img src="${anime.images.jpg.large_image_url}" class="w-full h-full object-cover transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-80"></div>
                        
                        <div class="absolute bottom-3 left-3 right-3">
                            <span class="text-[9px] ${tieneLink ? 'bg-green-500' : 'bg-slate-700'} text-white px-2 py-1 rounded font-black uppercase tracking-tighter shadow-lg">
                                ${tieneLink ? 'Servidor Listo' : 'En Espera'}
                            </span>
                        </div>
                    </div>
                    <h3 class="mt-3 text-xs font-bold text-slate-300 group-hover:text-blue-500 transition-colors truncate">${anime.title}</h3>
                `;
                catalogo.appendChild(card);
            });
        }

        // Evento Buscador
        let delay;
        buscador.addEventListener('input', (e) => {
            clearTimeout(delay);
            delay = setTimeout(() => cargarAnimes(e.target.value), 600);
        });

        // Inicio
        cargarAnimes();

    </script>
</body>
</html>
