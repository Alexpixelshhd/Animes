<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Stream | Portal ⛩️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #f8fafc; }
        .anime-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-4xl font-black text-blue-500 mb-4 uppercase italic">Zenith Stream</h1>
        <input type="text" id="buscador" placeholder="Busca tu anime..." 
               class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
    </header>

    <main id="catalogo" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 max-w-6xl mx-auto">
        </main>

    <script src="script.js"></script>
</body>
</html>
