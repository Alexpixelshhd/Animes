<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexstreaming | Tu Portal de Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; color: #f8fafc; font-family: sans-serif; }
        .card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#05070a] z-50">
        <h1 class="text-2xl font-black text-blue-500 tracking-widest uppercase">Alexstreaming</h1>
        <input type="text" id="buscador" placeholder="Busca tu anime..." 
               class="bg-gray-900 border border-gray-700 px-4 py-2 rounded-full w-64 focus:ring-2 focus:ring-blue-600 outline-none">
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="contenedor-animes" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
