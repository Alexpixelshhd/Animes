<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Stream | Estilo TioAnime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e2e8f0; }
        .anime-card:hover img { transform: scale(1.05); }
        .glass { background: rgba(20, 26, 35, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-slate-800 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-blue-500 font-black text-2xl tracking-tighter uppercase italic">Zenith Stream</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg outline-none focus:border-blue-500 w-64">
        </div>
    </nav>

    <section id="contenedor-video" class="max-w-5xl mx-auto p-4 hidden animate-fade-in">
        <div class="flex justify-end mb-2">
            <button onclick="cerrarReproductor()" class="text-slate-400 hover:text-white text-sm font-bold uppercase tracking-widest">✕ Cerrar</button>
        </div>
        <div class="bg-black aspect-video rounded-xl overflow-hidden shadow-2xl border border-slate-800">
            <iframe id="reproductor" src="" class="w-full h-full" allowfullscreen></iframe>
        </div>
        <h2 id="titulo-actual" class="mt-4 text-2xl font-bold text-white"></h2>
        <hr class="border-slate-800 my-6">
    </section>

    <main class="max-w-6xl mx-auto p-6">
        <h3 class="text-slate-500 uppercase tracking-widest text-sm font-bold mb-6 italic">Catálogo Directo</h3>
        <div id="lista-animes" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script>
        // Tu "Base de Datos" manual
        const misAnimes = [
            {
                titulo: "Jojo's Bizarre Adventure",
                imagen: "https://cdn.myanimelist.net/images/anime/3/40327.jpg",
                linkVideo: "https://www.fembed.com/v/ejemplo1" 
            },
            {
                titulo: "One Piece",
                imagen: "https://cdn.myanimelist.net/images/anime/6/73245.jpg",
                linkVideo: "https://mega.nz/embed/ejemplo2"
            }
        ];

        const grid = document.getElementById('lista-animes');
        const visor = document.getElementById('contenedor-video');
        const iframe = document.getElementById('reproductor');
        const txtTitulo = document.getElementById('titulo-actual');

        function renderizar() {
            grid.innerHTML = '';
            misAnimes.forEach(anime => {
                const card = document.createElement('div');
                card.className = "anime-card cursor-pointer group";
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-lg aspect-[3/4] border border-slate-800">
                        <img src="${anime.imagen}" class="w-full h-full object-cover transition-transform duration-300">
                        <div class="absolute inset-0 bg-gradient-to-t from-black opacity-60"></div>
                    </div>
                    <h4 class="mt-2 font-bold text-sm truncate group-hover:text-blue-400 transition-colors">${anime.titulo}</h4>
                `;
                card.onclick = () => verAnime(anime);
                grid.appendChild(card);
            });
        }

        function verAnime(anime) {
            // Quitamos 'hidden' para mostrar la sección
            visor.classList.remove('hidden');
            iframe.src = anime.linkVideo;
            txtTitulo.innerText = anime.titulo;
            
            // Scroll suave hacia el video
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cerrarReproductor() {
            visor.classList.add('hidden');
            iframe.src = ""; // Limpiamos el src para detener el video
        }

        renderizar();
    </script>
</body>
</html>
