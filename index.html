<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Radar - Recomendaciones Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <!-- Encabezado -->
    <header class="p-6 bg-blue-700 shadow-xl text-center">
        <h1 class="text-3xl font-bold uppercase tracking-widest">📺 Anime Radar</h1>
        <p class="text-blue-200">Recomendaciones automáticas y legales</p>
    </header>

    <!-- Contenedor de Recomendaciones -->
    <main class="container mx-auto mt-10 p-4">
        <h2 class="text-2xl mb-6 border-b-2 border-blue-500 inline-block">🔥 Tendencias de la Temporada</h2>
        
        <!-- Aquí es donde JavaScript "dibujará" los animes -->
        <div id="anime-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <p class="text-gray-400">Cargando lo mejor del anime...</p>
        </div>
    </main>

    <footer class="mt-20 p-10 bg-gray-800 text-center text-sm text-gray-500">
        Datos proporcionados por la API de Jikan (MyAnimeList).
    </footer>

</body>
</html>
