<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro | Portal 🌌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalizamos el fondo y el efecto de "vidrio" */
        body { background-color: #050811; color: #e2e8f0; }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(51, 65, 85, 0.5); 
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">
                ZENITH <span class="text-blue-500">ANIME</span>
            </h1>
            
            <div class="relative w-full md:w-1/3">
                <input 
                    type="text" 
                    id="input-busqueda" 
                    placeholder="Buscar anime..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
            </div>

            <div id="notificacion" class="fixed bottom-8 right-8 opacity-0 translate-y-24 transition-all duration-500 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] font-bold">
                ¡Añadido a favoritos! ⭐
            </div>
        </div>
    </nav>

    <header class="container mx-auto mt-8 px-4 flex gap-3 overflow-x-auto pb-4 no-scrollbar">
        <button class="btn-filtro bg-blue-600 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap" data-genre="">🔥 Top Populares</button>
        <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap" data-genre="1">⚔️ Acción</button>
        <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap" data-genre="22">💖 Romance</button>
        <button class="btn-filtro bg-slate-900 hover:bg-slate-800 border border-slate-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap" data-genre="4">🎭 Comedia</button>
    </header>

    <main class="container mx-auto mt-6 p-4">
        <div id="grilla-animes" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <p class="col-span-full text-center text-slate-500 animate-pulse">Conectando con el servidor... ⚙️</p>
        </div>
    </main>

    <footer class="text-center py-10 opacity-20 text-xs uppercase tracking-widest">
        Powered by Jikan API & AnimeFLV
    </footer>

    <script src="script.js"></script>
</body>
</html>
