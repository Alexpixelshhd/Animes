<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro | Tu Portal Definitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización de colores y efectos */
        :root {
            --bg-dark: #0b0f1a;
            --accent: #3b82f6;
        }
        
        body {
            background-color: var(--bg-dark);
            scroll-behavior: smooth;
        }

        /* Efecto Cristal (Glassmorphism) */
        .glass {
            background: rgba(22, 27, 44, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estilo de las tarjetas de anime */
        .anime-card {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        /* Animación de carga para las imágenes */
        .img-placeholder {
            background: linear-gradient(90deg, #161b2c 25%, #1f2937 50%, #161b2c 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-gray-100">

    <nav class="glass sticky top-0 z-50 px-6 py-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🌌</span>
                <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    ZENITH ANIME PRO
                </h1>
            </div>
            
            <div class="relative w-full md:w-1/3">
                <input 
                    type="text" 
                    id="main-search" 
                    placeholder="Busca por nombre..." 
                    class="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-10 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
                <span class="absolute left-3 top-3 text-gray-500">🔍</span>
            </div>

            <button id="btn-favoritos" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl font-bold transition-colors">
                <span>⭐</span> Mis Favoritos
            </button>
        </div>
    </nav>

    <section class="container mx-auto mt-8 px-4">
        <div class="flex flex-wrap justify-center gap-3" id="filter-tags">
            <button data-genre="" class="filter-btn active bg-blue-600 px-4 py-1.5 rounded-lg text-sm font-bold shadow-lg shadow-blue-900/20">🔥 Tendencias</button>
            <button data-genre="1" class="filter-btn bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">⚔️ Acción</button>
            <button data-genre="2" class="filter-btn bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">🚀 Aventura</button>
            <button data-genre="4" class="filter-btn bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">🎭 Comedia</button>
            <button data-genre="22" class="filter-btn bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">💖 Romance</button>
            <button data-genre="37" class="filter-btn bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">👻 Sobrenatural</button>
        </div>
    </section>

    <main class="container mx-auto mt-10 p-4 pb-20">
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <div class="col-span-full text-center py-20 text-gray-500">
                <div class="inline-block animate-spin text-4xl mb-4">⚙️</div>
                <p class="text-xl font-medium">Sincronizando con la base de datos...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 py-8 text-center text-gray-500 text-sm">
        <p>© 2024 Zenith Anime Pro - Impulsado por Jikan API</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
