<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithAnime | Tu Portal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white min-h-screen">

    <nav class="p-6 border-b border-gray-800 bg-[#161b2c]">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter">ZENITH ANIME 🌌</h1>
            
            <input 
                type="text" 
                id="search-box" 
                placeholder="Busca tu anime..." 
                class="w-full md:w-80 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
            >
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="col-span-full text-center text-gray-500">Cargando sistema...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
