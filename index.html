<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Streaming ⛩️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #f8fafc; }
        .glass-nav { background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-800 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter">ZENITH<span class="text-white">STREAM</span></h1>
            
            <div class="w-full md:w-1/2">
                <input 
                    type="text" 
                    id="input-busqueda" 
                    placeholder="Escribe el nombre del anime..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-full py-2 px-6 focus:ring-2 focus:ring-blue-600 outline-none transition-all"
                >
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div id="grilla-animes" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
