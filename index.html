<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Anime Pro | Dashboard 🌌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efecto de desenfoque para la navegación */
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 1);
        }
        /* Animación suave para las tarjetas */
        .anime-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .anime-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/20">
                    <span class="text-2xl">⚡</span>
                </div>
                <h1 class="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    ZENITH ANIME PRO
                </h1>
            </div>

            <div class="relative w-full md:w-1/3">
                <input 
                    type="text" 
                    id="main-search" 
                    placeholder="Explorar series y películas..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-10 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-500"
                >
                <span class="absolute left-3 top-2.5 text-slate-500">🔍</span>
            </div>

            <div class="flex gap-4">
                <button id="btn-favoritos" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg font-bold border border-slate-700 transition-colors text-sm">
                    ⭐ <span class="hidden sm:inline">Mis Favoritos</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="container mx-auto mt-8 px-4">
        <div class="flex items-center gap-4 overflow-x-auto pb-4 no-scrollbar" id="filter-container">
            <button class="filter-btn active bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap shadow-lg shadow-blue-900/40" data-genre="">🔥 Tendencias</button>
            <button class="filter-btn bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap border border-slate-700 transition-all" data-genre="1">⚔️ Acción</button>
            <button class="filter-btn bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap border border-slate-700 transition-all" data-genre="22">💖 Romance</button>
            <button class="filter-btn bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap border border-slate-700 transition-all" data-genre="4">🎭 Comedia</button>
            <button class="filter-btn bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap border border-slate-700 transition-all" data-genre="37">👻 Sobrenatural</button>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4">
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <div class="col-span-full text-center py-20 opacity-50">
                <p class="text-lg italic">Iniciando protocolos de búsqueda...</p>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl z-[60] font-bold text-sm">
        ¡Añadido a favoritos! ⭐
    </div>

    <script src="script.js"></script>
</body>
</html>
